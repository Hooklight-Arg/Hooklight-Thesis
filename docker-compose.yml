name: hooklight-thesis

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Solo en desarrollo, no exponer en produccion el puerto
    ports:
      - "5432:5432"
    volumes:
      - phishing-simulation_postgres_data:/var/lib/postgresql/data
    networks:
      - tesis_network

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      WEBHOOK_URL: "https://www.hooklight.org/"
      N8N_HOST: "hooklight.org"
      N8N_PROTOCOL: "https"
      N8N_PROXY_HOPS: "1"
      N8N_EDITOR_BASE_URL: "https://www.hooklight.org"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - phishing-simulation_n8n_data:/home/node/.n8n
    networks:
      - tesis_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: PGadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: hooklightar@gmail.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - tesis_network

  cloudflare:
    image: cloudflare/cloudflared:2024.8.2
    container_name: cloudflare
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - n8n
    networks:
      - tesis_network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - tesis_network

volumes:
  phishing-simulation_postgres_data:
    external: true
  pgadmin_data:
  grafana_data:
  phishing-simulation_n8n_data:
    external: true

networks:
  tesis_network:
    driver: bridge
